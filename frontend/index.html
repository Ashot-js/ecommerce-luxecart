<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LuxeCart — Premium E-Commerce" />
    <title>LuxeCart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Auto-recover from stale cache: reload if any chunk returns HTML instead of JS -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('dynamically imported module')) {
          if (!sessionStorage.getItem('luxecart-reloaded')) {
            sessionStorage.setItem('luxecart-reloaded', '1');
            location.reload();
          }
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
